<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Asana Systems</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fafbfd;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .login-card {
            background: #ffffff;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            height: 40px;
            margin-bottom: 2rem;
        }
        .login-card h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .login-card p {
            color: #64748b;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-1);
        }
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-login:hover {
            background: #1e293b;
            transform: translateY(-1px);
        }
        .btn-login:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            border: 1px solid rgba(220, 38, 38, 0.1);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="images/asana%20png.png" alt="Logo" class="login-logo">
        <h1>Admin Portal</h1>
        <p>Please enter your credentials to manage inquiries.</p>

        <div id="errorMessage" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="admin@asanasystems.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-login">Sign In</button>
        </form>
        
        <div style="margin-top: 2rem; font-size: 0.85rem; color: #94a3b8;">
            <a href="index.html" style="color: inherit; text-decoration: none;">&larr; Return to main site</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=1.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof window.loadEnv === 'function') await window.loadEnv();
            
            const supabaseClient = window.supabase.createClient(
                window.ENV.SUPABASE_URL,
                window.ENV.SUPABASE_ANON_KEY
            );

            const loginForm = document.getElementById('loginForm');
            const errorMsg = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                loginBtn.textContent = 'Authenticating...';
                loginBtn.disabled = true;

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                // 1. Try Supabase Auth first (Recommended)
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (!error) {
                    window.location.href = 'admin.html';
                    return;
                }

                // 2. FALLBACK: Check against .env hardcoded credentials
                // This is helpful if you are having trouble with the Supabase dashboard
                const envEmail = window.ENV.ADMIN_EMAIL;
                const envPass = window.ENV.ADMIN_PASSWORD;

                if (envEmail && envPass && email === envEmail && password === envPass) {
                    console.warn('Authenticated via local fallback (.env)');
                    // Create a mock session so admin.html doesn't redirect back
                    localStorage.setItem('admin_bypass_session', 'true');
                    window.location.href = 'admin.html';
                } else {
                    console.error('Login error:', error);
                    errorMsg.textContent = 'Invalid credentials. Please check your .env or Supabase dashboard.';
                    errorMsg.style.display = 'block';
                    loginBtn.textContent = 'Sign In';
                    loginBtn.disabled = false;
                }
            });
            
            // Auto-redirect if already logged in (via Supabase or Bypass)
            const { data: { session } } = await supabaseClient.auth.getSession();
            const bypass = localStorage.getItem('admin_bypass_session') === 'true';
            
            if (session || bypass) {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>

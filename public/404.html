<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | furtuu Systems</title>
  <link rel="icon" type="image/png" href="/images/whitelogo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --brand: #166804;
      --brand-light: #e8f5e6;
      --text: #0f172a;
      --text-muted: #64748b;
      --bg: #f8fafc;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid pattern background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(22, 104, 4, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 104, 4, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 70%);
    }

    /* Animated circle */
    .orbit-ring {
      position: absolute;
      border: 2px solid rgba(22, 104, 4, 0.08);
      border-radius: 50%;
      animation: spin 30s linear infinite;
    }

    .orbit-ring--1 {
      width: 600px;
      height: 600px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .orbit-ring--2 {
      width: 400px;
      height: 400px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 20s;
      animation-direction: reverse;
      border-color: rgba(33, 128, 204, 0.08);
    }

    .orbit-ring--3 {
      width: 250px;
      height: 250px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 12s;
      border-color: rgba(22, 104, 4, 0.12);
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--brand);
      border-radius: 50%;
      opacity: 0.3;
      animation: float-up 15s ease-in-out infinite;
    }

    .particle:nth-child(1) { left: 15%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 35%; animation-delay: 2s; width: 6px; height: 6px; }
    .particle:nth-child(3) { left: 55%; animation-delay: 4s; background: #2180cc; }
    .particle:nth-child(4) { left: 75%; animation-delay: 1s; width: 10px; height: 10px; }
    .particle:nth-child(5) { left: 85%; animation-delay: 3s; }
    .particle:nth-child(6) { left: 25%; animation-delay: 5s; background: #2180cc; width: 5px; height: 5px; }
    .particle:nth-child(7) { left: 65%; animation-delay: 6s; }

    @keyframes float-up {
      0%, 100% { 
        transform: translateY(100vh) scale(1);
        opacity: 0;
      }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { 
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
      }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
    }

    /* Logo */
    .logo {
      width: clamp(60px, 12vw, 90px);
      height: auto;
      margin-bottom: 3rem;
      animation: fadeInDown 0.6s ease-out;
    }

    /* 404 with visual element */
    .error-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    .error-graphic {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      pointer-events: none;
    }

    .error-graphic svg {
      width: 100%;
      height: 100%;
      opacity: 0.15;
    }

    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(6rem, 22vw, 14rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.04em;
      background: linear-gradient(145deg, var(--brand) 0%, var(--brand) 60%, #2180cc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 1px rgba(22, 104, 4, 0.3));
      position: relative;
      z-index: 1;
    }

    .error-code::selection {
      background: var(--brand-light);
      -webkit-text-fill-color: var(--brand);
    }

    /* Title */
    .title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 700;
      margin: 0 0 0.75rem;
      color: var(--text);
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    /* Description */
    .description {
      color: var(--text-muted);
      font-size: clamp(0.875rem, 2vw, 1rem);
      line-height: 1.7;
      max-width: 380px;
      margin: 0 auto 2.5rem;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    /* Button group */
    .btn-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9375rem;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn--primary {
      background: var(--brand);
      color: white;
      box-shadow: 0 4px 16px -4px rgba(22, 104, 4, 0.4);
    }

    .btn--primary:hover {
      background: #145604;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -6px rgba(22, 104, 4, 0.5);
    }

    .btn--secondary {
      background: white;
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .btn--secondary:hover {
      border-color: var(--brand);
      color: var(--brand);
      transform: translateY(-2px);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .btn--primary svg {
      transition: transform 0.25s ease;
    }

    .btn--primary:hover svg {
      transform: translateX(-3px);
    }

    /* Animated underline */
    .btn--secondary {
      position: relative;
      overflow: hidden;
    }

    .btn--secondary::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--brand);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.3s ease;
    }

    .btn--secondary:hover::before {
      transform: scaleX(1);
      transform-origin: left;
    }

    /* Footer links */
    .footer {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2rem;
      font-size: 0.875rem;
      animation: fadeIn 0.6s ease-out 0.6s both;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer a:hover {
      color: var(--brand);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 1.5rem;
      }

      .btn-group {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 240px;
        justify-content: center;
      }

      .footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .orbit-ring--1 { width: 450px; height: 450px; }
      .orbit-ring--2 { width: 300px; height: 300px; }
      .orbit-ring--3 { width: 180px; height: 180px; }
    }

    @media (min-width: 768px) {
      .btn-group {
        gap: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background elements -->
  <div class="grid-bg"></div>
  <div class="orbit-ring orbit-ring--1"></div>
  <div class="orbit-ring orbit-ring--2"></div>
  <div class="orbit-ring orbit-ring--3"></div>
  
  <!-- Floating particles -->
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <div class="container">
    <img src="/images/logo.png" alt="furtuu Systems Logo" class="logo" onerror="this.style.display='none'" />
    
    <div class="error-wrapper">
      <!-- Rotating geometric overlay -->
      <div class="error-graphic">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4 4"/>
          <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="0.5"/>
          <circle cx="50" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="6 4"/>
        </svg>
      </div>
      <h1 class="error-code">404</h1>
    </div>
    
    <h2 class="title">Lost in space?</h2>
    <p class="description">
      The page you're looking for has wandered off into the digital void. 
      Let's get you back where you belong.
    </p>
    
    <div class="btn-group">
      <a href="/" class="btn btn--primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
        Home
      </a>
      <a href="/services" class="btn btn--secondary">
        Browse Services
      </a>
    </div>
  </div>

  <nav class="footer">
    <a href="/">Home</a>
    <a href="/services">Services</a>
    <a href="/projects">Projects</a>
    <a href="/contact">Contact</a>
  </nav>
</body>
</html>

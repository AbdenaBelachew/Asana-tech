<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Furtu Systems</title>
  <link rel="icon" type="image/png" href="/images/whitelogo.png" />
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 6rem;
      margin: 0;
      color: #166804;
      line-height: 1;
      font-weight: 800;
    }
    h2 {
      font-size: 2rem;
      margin: 1rem 0;
      font-weight: 600;
    }
    p {
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 1.125rem;
      max-width: 500px;
    }
    a {
      display: inline-block;
      background-color: #166804;
      color: white;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 500;
      transition: background-color 0.2s, transform 0.2s;
    }
    a:hover {
      background-color: #114e03;
      transform: translateY(-2px);
    }
    .logo {
      width: 150px;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <img src="/images/logo.png" alt="Furtu Systems Logo" class="logo" onerror="this.style.display='none'" />
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
  <a href="/">Go Back Home</a>
</body>
</html>
